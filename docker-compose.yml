services:

  cv-analyzer-1:
    container_name: elastic-workbench-cv-analyzer-1
    build:
      context: .
      dockerfile: iot_services/CvAnalyzer_Yolo/CvAnalyzer_Yolo.Dockerfile
    image: elastic-workbench-cv-analyzer:latest
    networks:
      - docker_network
    environment:
      - FLASK_ENV=development
      - CONTAINER_REF=elastic-workbench-cv-analyzer-1
      - REDIS_INSTANCE=redis
      - DEFAULT_CLIENTS=C_1:30
    volumes:
      - ./share:/src/share # Linux
      - /var/run/docker.sock:/var/run/docker.sock # Needed on Windows
      - /etc/localtime:/etc/localtime:ro # Mounting timezone volume
    ports:
      - "8081:8080" # Only needed on Windows
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    networks:
      docker_network:
    ports:
      - "9090:9090" # Prometheus UI
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml # Linux
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-admin-api

  grafana:
    image: grafana/grafana
    container_name: grafana
    networks:
      docker_network:
    ports:
      - "3000:3000" # Grafana UI
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=adminadmin
    depends_on:
      - prometheus

  redis:
    image: redis:latest
    container_name: redis
    networks:
      docker_network:
        ipv4_address: 172.20.0.4
    ports:
      - "6379:6379"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks:
      docker_network:
    ports:
      - "8090:8080" # Expose the cAdvisor UI and metrics endpoint
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro


networks:
  docker_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
